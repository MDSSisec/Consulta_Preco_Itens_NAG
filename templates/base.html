<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pesquisa de preços</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div id="global-loading" class="global-loading d-none" aria-live="polite" aria-busy="true">
      <div class="global-loading__backdrop"></div>
      <div class="global-loading__panel shadow">
        <div class="spinner-border text-primary" role="status" aria-label="Carregando"></div>
        <div class="ms-3">
          <div class="fw-semibold">Buscando…</div>
          <div class="text-muted small">Isso pode levar alguns segundos.</div>
        </div>
      </div>
    </div>

    <div class="container-fluid py-2 px-3 px-lg-5">
      <h1 class="mb-3">Pesquisa de preços</h1>

      <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
          <a class="nav-link {% if aba_atual == 'compras' %}active{% endif %}" href="{{ url_for('compras.compras_index') }}">
            Compras.gov.br (CATMAT)
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if aba_atual == 'serpapi' %}active{% endif %}" href="{{ url_for('serpapi.serpapi_index') }}">
            SerpAPI (Google Shopping)
          </a>
        </li>
      </ul>

      {% block content %}{% endblock %}
    </div>

    <script>
      (function () {
        const overlay = document.getElementById("global-loading");
        if (!overlay) return;

        function showLoading(form) {
          overlay.classList.remove("d-none");

          const submitButtons = form.querySelectorAll("button[type='submit'], input[type='submit']");
          submitButtons.forEach((btn) => {
            if (btn.dataset.originalHtml === undefined) {
              btn.dataset.originalHtml = btn.tagName === "BUTTON" ? btn.innerHTML : btn.value;
            }
            btn.disabled = true;
            if (btn.tagName === "BUTTON") {
              btn.innerHTML = "<span class='spinner-border spinner-border-sm me-2' role='status' aria-hidden='true'></span>Buscando…";
            } else {
              btn.value = "Buscando…";
            }
          });
        }

        document.addEventListener("submit", function (e) {
          const form = e.target;
          if (!(form instanceof HTMLFormElement)) return;
          if (!form.classList.contains("js-loading-form")) return;
          showLoading(form);
        }, true);
      })();
    </script>
  </body>
</html>
