<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Pesquisa de Preços{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
  </head>

  <body class="bg-light">
    <!-- Global Loading Overlay -->
    <div
      id="global-loading"
      class="global-loading d-none"
      aria-live="polite"
      aria-busy="true"
      role="status"
    >
      <div class="global-loading__backdrop"></div>

      <div class="global-loading__panel shadow-sm rounded-3 d-flex align-items-center">
        <div class="spinner-border text-primary" aria-hidden="true"></div>
        <div class="ms-3">
          <div class="fw-semibold">Processando consulta...</div>
          <div class="text-muted small">Aguarde enquanto os dados são recuperados.</div>
        </div>
      </div>
    </div>

    <main class="container-fluid py-3 px-3 px-lg-5">
      <!-- Header -->
      <header class="mb-4">
        <h1 class="h4 mb-1">Pesquisa de Preços</h1>
        <p class="text-muted small mb-0">
          Consulta e análise de preços a partir de bases públicas e fontes externas.
        </p>
      </header>

      <!-- Navegação -->
      <nav aria-label="Seções de consulta">
        <ul class="nav nav-tabs mb-4">
          <li class="nav-item">
            <a
              class="nav-link {% if aba_atual == 'compras' %}active{% endif %}"
              href="{{ url_for('compras.compras_index') }}"
            >
              Compras.gov.br (CATMAT)
            </a>
          </li>
          <li class="nav-item">
            <a
              class="nav-link {% if aba_atual == 'serpapi' %}active{% endif %}"
              href="{{ url_for('serpapi.serpapi_index') }}"
            >
              Google Shopping (SerpAPI)
            </a>
          </li>
          <li class="nav-item">
            <a
              class="nav-link {% if aba_atual == 'metodologia' %}active{% endif %}"
              href="{{ url_for('metodologia.metodologia_index') }}"
            >
              Metodologia
            </a>
          </li>
        </ul>
      </nav>

      <!-- Conteúdo dinâmico -->
      <section>
        {% block content %}{% endblock %}
      </section>
    </main>

    <script>
      (function () {
        const overlay = document.getElementById("global-loading");
        if (!overlay) return;

        function disableSubmitButtons(form) {
          const buttons = form.querySelectorAll("button[type='submit'], input[type='submit']");

          buttons.forEach((btn) => {
            if (!btn.dataset.originalState) {
              btn.dataset.originalState = btn.tagName === "BUTTON" ? btn.innerHTML : btn.value;
            }

            btn.disabled = true;

            if (btn.tagName === "BUTTON") {
              btn.innerHTML =
                "<span class='spinner-border spinner-border-sm me-2' role='status' aria-hidden='true'></span>Processando...";
            } else {
              btn.value = "Processando...";
            }
          });
        }

        function showLoading(form) {
          overlay.classList.remove("d-none");
          disableSubmitButtons(form);
        }

        document.addEventListener(
          "submit",
          function (event) {
            const form = event.target;

            if (!(form instanceof HTMLFormElement)) return;
            if (!form.classList.contains("js-loading-form")) return;

            showLoading(form);
          },
          true
        );

        // Segurança extra: evita múltiplos submits via Enter repetido
        document.addEventListener("keydown", function (event) {
          if (event.key !== "Enter") return;

          const form = event.target.closest("form.js-loading-form");
          if (!form) return;

          if (!overlay.classList.contains("d-none")) {
            event.preventDefault();
          }
        });
      })();
    </script>
  </body>
</html>
